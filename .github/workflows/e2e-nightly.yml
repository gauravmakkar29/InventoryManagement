name: E2E Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  e2e-nightly:
    name: E2E Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install Node dependencies
        run: npm ci

      - name: Build and start preview server
        run: npm run build && npm run preview &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Install Playwright browsers (Java)
        working-directory: e2e/ims-e2e
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium --with-deps" -pl ims-core-ui

      - name: Build E2E framework
        working-directory: e2e/ims-e2e
        run: mvn clean install -DskipTests=true

      - name: Run full regression suite
        working-directory: e2e/ims-e2e/ims-tests
        run: mvn test -DsuiteXmlFile=src/test/resources/suites/regression-suite.xml
        env:
          AUT_DOMAIN: localhost:4173

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-nightly-report
          path: e2e/ims-e2e/ims-tests/src/test/resources/reports/
          retention-days: 30

      - name: Create bug issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Nightly] E2E regression failure — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              `## Nightly E2E Regression Failure`,
              ``,
              `- **Framework:** IMS E2E (Java/Maven/TestNG/Playwright)`,
              `- **Suite:** regression-suite.xml`,
              `- **Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `- **Date:** ${new Date().toISOString()}`,
              `- **Branch:** ${context.ref}`,
              ``,
              `### Next Steps`,
              `- [ ] Download ExtentReport artifact from the run`,
              `- [ ] Review failed test screenshots`,
              `- [ ] Identify root cause (selector change vs functional bug)`,
              `- [ ] Fix and verify locally: \`npm run test:e2e:smoke\``,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'nightly-failure'],
            });
