name: E2E Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  e2e-nightly:
    name: E2E Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install Node dependencies
        run: npm ci

      - name: Build and start preview server
        run: npm run build && npm run preview &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Build E2E framework
        working-directory: e2e/ims-e2e
        run: mvn clean install -DskipTests=true

      - name: Install Playwright browsers (Java)
        working-directory: e2e/ims-e2e
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium --with-deps" -pl ims-core-ui

      - name: Run full regression suite
        id: e2e-run
        working-directory: e2e/ims-e2e/ims-tests
        run: mvn test -DsuiteXmlFile=src/test/resources/suites/regression-suite.xml
        env:
          AUT_DOMAIN: localhost:4173
        continue-on-error: true

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-nightly-report
          path: |
            e2e/ims-e2e/ims-tests/src/test/resources/reports/
            e2e/ims-e2e/ims-tests/src/test/resources/screenshots/
            e2e/ims-e2e/ims-tests/target/surefire-reports/
          retention-days: 30

      - name: Parse test results for bug creation
        if: steps.e2e-run.outcome == 'failure'
        id: parse-results
        working-directory: e2e/ims-e2e/ims-tests
        run: |
          # Extract failed test names from surefire reports
          FAILED_TESTS=""
          if [ -d "target/surefire-reports" ]; then
            FAILED_TESTS=$(grep -l "failures=\"[1-9]\|errors=\"[1-9]" target/surefire-reports/*.xml 2>/dev/null | while read f; do
              basename "$f" .xml
            done | tr '\n' ', ' | sed 's/,$//')
          fi
          echo "failed_tests=${FAILED_TESTS}" >> $GITHUB_OUTPUT
          echo "Failed tests: ${FAILED_TESTS}"

      - name: Create bug issue on failure
        if: steps.e2e-run.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const failedTests = '${{ steps.parse-results.outputs.failed_tests }}' || 'Unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `[Nightly E2E] Regression failure — ${date}`;
            const body = [
              `## Nightly E2E Regression Failure`,
              ``,
              `- **Date:** ${date}`,
              `- **Branch:** \`${context.ref}\``,
              `- **Run:** [View CI Run](${runUrl})`,
              `- **Framework:** IMS E2E (Java/Maven/TestNG/Playwright)`,
              `- **Suite:** regression-suite.xml`,
              ``,
              `### Failed Test Classes`,
              `\`\`\``,
              failedTests,
              `\`\`\``,
              ``,
              `### Triage Checklist`,
              `- [ ] **Download** the \`e2e-nightly-report\` artifact from the [run](${runUrl})`,
              `- [ ] **Open** the ExtentReport HTML — review screenshots and step logs`,
              `- [ ] **Classify** the failure:`,
              `  - [ ] **Genuine bug** → Link to the affected story issue, add \`bug\` label`,
              `  - [ ] **Selector change** → Update page object in \`e2e/ims-e2e/ims-tests/src/main/java/com/ims/automation/pages/\``,
              `  - [ ] **Flaky test** → Check if retry passed; if persistent, fix timing/waits`,
              `  - [ ] **Environment issue** → Check if preview server started correctly`,
              `- [ ] **Fix** and verify locally: \`cd e2e/ims-e2e/ims-tests && mvn test -DsuiteXmlFile=src/test/resources/suites/smoke-suite.xml\``,
              `- [ ] **Close** this issue once resolved`,
              ``,
              `### How to Read the Report`,
              `1. Download \`e2e-nightly-report\` artifact from the run`,
              `2. Unzip → open \`reports/{date}/IMS-Regression-Report/IMS-Regression-Report.html\``,
              `3. Expand failed test → see steps, screenshots, and stack trace`,
              `4. Check \`screenshots/\` folder for failure captures`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'nightly-failure', 'e2e'],
            });
