name: CI

on:
  pull_request:
    branches: [main, dev, staging]
  push:
    branches: [main, dev, staging]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit & component tests
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E Tests
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install Node dependencies
        run: npm ci

      - name: Start preview server
        run: npm run build && npm run preview &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Build E2E framework
        working-directory: e2e/ims-e2e
        run: mvn clean install -DskipTests=true

      - name: Install Playwright browsers (Java)
        working-directory: e2e/ims-e2e
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium --with-deps" -pl ims-core-ui

      - name: Run E2E smoke tests
        working-directory: e2e/ims-e2e/ims-tests
        run: mvn test -DsuiteXmlFile=src/test/resources/suites/smoke-suite.xml
        env:
          AUT_DOMAIN: localhost:4173

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            e2e/ims-e2e/ims-tests/src/test/resources/reports/
            e2e/ims-e2e/ims-tests/src/test/resources/screenshots/
          retention-days: 30

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate
